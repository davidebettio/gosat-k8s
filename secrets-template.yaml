  CONTRACTS_EXPIRY_EMAIL: ""
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_USER: ""
  SMTP_PASS: ""
  GCP_TYPE: ""
  GCP_PROJECT_ID: ""
  GCP_PRIVATE_KEY_ID: ""
  GCP_PRIVATE_KEY: ""
