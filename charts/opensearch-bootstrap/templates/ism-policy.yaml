{{- if .Values.retention.enabled }}
# Auto-delete gosat-* indices after {{ .Values.retention.days }} days.
# Reconciled by the opensearch-k8s-operator: it pushes this policy to
# OpenSearch and the cluster evaluates indices every ~30 minutes.
apiVersion: opensearch.org/v1
kind: OpenSearchISMPolicy
metadata:
  name: gosat-logs-retention
spec:
  opensearchCluster:
    name: opensearch
  policyId: gosat-logs-retention
  description: "Delete gosat log indices after {{ .Values.retention.days }} days"
  defaultState: hot
  states:
    - name: hot
      actions: []
      transitions:
        - stateName: delete
          conditions:
            minIndexAge: "{{ .Values.retention.days }}d"
    - name: delete
      actions:
        - delete: {}
      transitions: []
  ismTemplate:
    indexPatterns:
      - "gosat-*"
    priority: 100
{{- end }}
