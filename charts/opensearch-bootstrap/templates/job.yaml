apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-bootstrap-{{ .Release.Revision }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "{{ .Values.hookWeight }}"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: OS_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.opensearch.adminSecret }}
                  key: username
            - name: OS_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.opensearch.adminSecret }}
                  key: password
            - name: OS_URL
              value: "https://{{ .Values.opensearch.host }}:{{ .Values.opensearch.port }}"
            - name: OSD_URL
              value: "http://{{ .Values.dashboards.host }}:{{ .Values.dashboards.port }}"
            - name: INDEX_PATTERN_ID
              value: "{{ .Values.indexPattern.id }}"
            - name: INDEX_PATTERN_TITLE
              value: "{{ .Values.indexPattern.title }}"
            - name: TIME_FIELD
              value: "{{ .Values.indexPattern.timeFieldName }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "→ waiting for OpenSearch"
              until curl -sk -u "$OS_USER:$OS_PASS" "$OS_URL/_cluster/health" \
                  | grep -qE '"status":"(green|yellow)"'; do
                sleep 5
              done
              echo "  ok"

              echo "→ applying index template 'gosat'"
              curl -sk -u "$OS_USER:$OS_PASS" -X PUT "$OS_URL/_index_template/gosat" \
                -H 'Content-Type: application/json' -d @- <<'JSON'
              {
                "index_patterns": ["gosat-*"],
                "priority": 100,
                "template": {
                  "mappings": {
                    "properties": {
                      "kubernetes": {
                        "properties": {
                          "labels":      { "type": "flat_object" },
                          "annotations": { "type": "flat_object" }
                        }
                      },
                      "level":     { "type": "keyword" },
                      "service":   { "type": "keyword" },
                      "requestId": { "type": "keyword" }
                    }
                  }
                }
              }
              JSON
              echo
              echo "  ok"

              echo "→ waiting for OpenSearch Dashboards"
              until curl -sf "$OSD_URL/api/status" >/dev/null 2>&1; do
                sleep 5
              done
              echo "  ok"

              echo "→ creating/updating index pattern '$INDEX_PATTERN_TITLE'"
              curl -sk -u "$OS_USER:$OS_PASS" -X POST \
                "$OSD_URL/api/saved_objects/index-pattern/$INDEX_PATTERN_ID?overwrite=true" \
                -H 'osd-xsrf: true' \
                -H 'Content-Type: application/json' \
                -d "{\"attributes\":{\"title\":\"$INDEX_PATTERN_TITLE\",\"timeFieldName\":\"$TIME_FIELD\"}}"
              echo
              echo "  ok"

              echo "→ setting '$INDEX_PATTERN_TITLE' as default index"
              curl -sk -u "$OS_USER:$OS_PASS" -X POST \
                "$OSD_URL/api/opensearch-dashboards/settings/defaultIndex" \
                -H 'osd-xsrf: true' \
                -H 'Content-Type: application/json' \
                -d "{\"value\":\"$INDEX_PATTERN_ID\"}"
              echo
              echo "=== bootstrap complete ==="
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
