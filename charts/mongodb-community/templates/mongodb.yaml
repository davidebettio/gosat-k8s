apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb
spec:
  members: {{ .Values.members }}
  type: ReplicaSet
  version: {{ .Values.version | quote }}
  security:
    authentication:
      modes: ["SCRAM"]
      {{- if not .Values.auth.enabled }}
      ignoreUnknownUsers: true
      {{- end }}
  users:
    - name: gosat
      db: admin
      passwordSecretRef:
        name: mongodb-gosat-password
      roles:
        - name: root
          db: admin
      scramCredentialsSecretName: mongodb-gosat-scram
  statefulSet:
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            {{- if .Values.persistence.storageClass }}
            storageClassName: {{ .Values.persistence.storageClass | quote }}
            {{- end }}
            resources:
              requests:
                storage: {{ .Values.persistence.size }}
        - metadata:
            name: logs-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            {{- if .Values.persistence.storageClass }}
            storageClassName: {{ .Values.persistence.storageClass | quote }}
            {{- end }}
            resources:
              requests:
                storage: 1Gi
