{{- if and .Values.service.enabled (not .Values.headless) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gosat-service.fullname" . }}
  labels:
    {{- include "gosat-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "gosat-service.selectorLabels" . | nindent 4 }}
{{- end }}
