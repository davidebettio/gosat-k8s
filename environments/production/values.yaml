# ─── DigitalOcean Production ──────────────────────────────────────────────────

# DigitalOcean Container Registry
registry: registry.digitalocean.com/gosat
imageTag: v0.0.2
domain: beta.gosat.it

# TLS via cert-manager / Let's Encrypt
tls:
  enabled: true

# Ingress: DigitalOcean LoadBalancer
ingress:
  enabled: true
  serviceType: LoadBalancer

# gosat-server: dedicated DigitalOcean LoadBalancer on TCP 30060 for device traffic
gosat-server:
  serviceType: LoadBalancer

# Infrastructure: production sizing
mongodb:
  replicaCount: 3
  version: "8.0.0"
  auth:
    enabled: true
  persistence:
    size: 200Gi
    storageClass: do-block-storage
  resources:
    memory: 4Gi
    cpu: "2"

redis:
  persistence:
    size: 5Gi

rabbitmq:
  password: "gosat-prod-ZxQ8vT7Rm" # Set via HELMFILE_RABBITMQ_PASSWORD or sealed secret
  persistence:
    size: 10Gi

loki:
  retentionPeriod: "720h"   # 30 days
  persistence:
    size: "20Gi"
    storageClass: do-block-storage
  resources:
    cpu: "500m"
    memory: "768Mi"

grafana:
  persistence:
    size: "2Gi"
    storageClass: do-block-storage
